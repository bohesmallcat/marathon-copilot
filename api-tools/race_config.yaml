# =============================================================================
# Marathon Race Configuration
# Single source of truth for race, runner, training, diet, and thresholds.
# Used by: generate_daily_briefing.py, daily_weather_report.py, etc.
# =============================================================================

race:
  name: "2026 上海苏州河半程马拉松"
  name_en: "2026 Shanghai Suzhou River Half Marathon"
  date: "2026-03-28"
  start_time: "07:00"
  city: Shanghai
  city_cn: 上海
  distance_km: 21.0975
  gps_distance_km: 21.35
  is_full: false
  course_notes: "苏州河沿线，城区赛道遮挡率 60%，开阔段约 3.5km"

runner:
  name: 薄荷猫猫
  weight_kg: 52
  height_cm: 166
  bsa: 1.57
  body_correction: 0.90
  pb: "1:33:56"
  pb_315: "1:36:03"
  tpace: "4'03\""
  tpace_bpm: 176
  reserve_per_km: 21   # seconds
  plans:
    a: { time: "1:33:00", pace: "4'24\"/km", gps_pace: "4'22\"/km" }
    b: { time: "1:33:50", pace: "4'26\"/km", gps_pace: "4'25\"/km" }
    c: { time: "1:35:00", pace: "4'28\"/km", gps_pace: "4'28\"/km" }

# Baseline weather assumptions from battle plan (3/16)
baseline:
  weather: "晴 (Sunny)"
  temp_start: 10.6
  temp_end: 14.4
  humidity: 44
  wind_mph: 8
  wind_kmh: 13
  wind_dir: 北
  rain_chance: 5
  uv: 7
  env_tax:
    total: 15
    wind: 2
    humidity: 0
    temp: 0
    uv: 5
    turnaround: 8

# Environment tax model parameters
env_tax_model:
  optimal_temp_low: 5       # °C
  optimal_temp_high: 15     # °C
  humidity_drift_threshold: 70  # %
  wind_penalty_per_mph: 0.5    # seconds/km per mph
  crosswind_coeff: 0.50
  urban_shelter_reduction: 0.40  # 60% shelter -> 40% effective
  exposed_km: 3.5
  turnaround_tax: 8             # fixed seconds

# Signal thresholds (env tax change from baseline)
signal:
  green: 10     # < ±10" = plan valid
  yellow: 30    # 10-30" = minor adjustments
  orange: 60    # 30-60" = consider downgrade
  # > 60" = red, plan failure

# ---------------------------------------------------------------------------
# Training plans (keyed by D-N days before race)
# ---------------------------------------------------------------------------
training:
  4:   # D-4
    phase: "Taper 减量期"
    workout: 轻松跑
    distance: "5km @ 5'30\"/km"
    rpe: "RPE 4"
    hr_cap: "< 145bpm"
    gear: 日常训练鞋
    details: "维持跑感，Taper 减量期不追速。"
    post_run:
      - "足弓强化训练（全量 5 动作 × 全组数，约 15 分钟）"
      - "泡沫轴放松 10min（小腿 + 大腿前侧）"
      - "血泡状态检查"
    arch_training: 全量

  3:   # D-3
    phase: 赛前激活
    workout: "赛前开腿跑（醒腿）"
    distance: "5km 总量：2km 热身 + 4x200m @ 3'50\"-4'00\"（间歇慢跑 200m）+ 1.5km 放松"
    rpe: "RPE 5-6"
    hr_cap: "200m 间歇可至 170bpm"
    gear: 日常训练鞋
    details: >-
      赛前最后一次有速度的训练。200m 间歇调动快肌纤维，
      速度快于比赛配速但距离极短，不产生疲劳。
    post_run:
      - "足弓强化训练（全量 — 最后一次全量训练）"
      - "泡沫轴放松 10min"
      - "拉伸 15min"
    arch_training: "全量（最后一次）"

  2:   # D-2
    phase: "Taper + 碳水负荷"
    workout: "完全休息（散步可）"
    distance: 0km
    rpe: "—"
    hr_cap: "—"
    gear: "—"
    details: >-
      赛前 2 天，完全休息让身体超量恢复。碳水负荷启动日，
      全力吃碳水：白米饭、面条、面包、果汁。
    post_run:
      - "足弓强化训练（减半，各 1 组即可）"
      - "轻度拉伸 10min"
    arch_training: "减半（各 1 组）"

  1:   # D-1
    phase: 赛前最终准备
    workout: 极轻松抖腿跑
    distance: "2km @ 6'00\"/km + 2x100m 大步跑"
    rpe: "RPE 2-3"
    hr_cap: "< 135bpm (慢跑段)"
    gear: 日常训练鞋
    details: >-
      仅为保持跑感和神经激活。100m 大步跑感受一下身体弹性。
      22:00 前入睡。
    post_run:
      - "足弓强化训练（减半，各 1 组）"
      - "检查比赛装备清单：鞋子、号码布、手表充电、能量胶、帽子、足弓贴扎材料、凡士林、水泡贴、五趾袜"
    arch_training: "减半（各 1 组）"
    extra: |
      **装备检查清单：**
      - [ ] Alphafly 3（已测试确认）
      - [ ] 号码布 + 安全别针
      - [ ] 手表充电至 100%
      - [ ] 能量胶 x2（10km + 赛前）
      - [ ] 帽子/遮阳帽
      - [ ] 足弓贴扎（Low-Dye taping）材料：肌贴/运动胶带
      - [ ] 凡士林/Body Glide
      - [ ] 水泡贴（Compeed）
      - [ ] 五趾袜
      - [ ] 短袖 + 短裤
      - [ ] 赛后换洗衣物 + 一次性雨衣（赛后备用）

  0:   # D-Day
    phase: 比赛日
    workout: "2026 上海苏州河半程马拉松"
    distance: 21.0975km
    rpe: 全力
    hr_cap: 按配速表执行
    gear: "Alphafly 3 + 足弓贴扎 + 凡士林 + 水泡贴 + 五趾袜"
    details: >-
      04:30 起床 → 05:00 早餐 → 06:00 到达起点 →
      06:30 热身慢跑 10min + 动态拉伸 → 06:50 进入出发区 → 07:00 起跑
    post_run: []
    arch_training: 不做

# ---------------------------------------------------------------------------
# Diet plans (keyed by D-N)
# ---------------------------------------------------------------------------
diet:
  4:   # D-4
    phase: 正常训练期
    carb_target: "260-312g（5-6g/kg）"
    protein_target: "62g（1.2g/kg）"
    water: "1.5-2L"
    meals:
      早餐: "粥/面包 + 鸡蛋 + 牛奶（~60g 碳水 + 20g 蛋白）"
      午餐: "米饭 + 瘦肉/鱼 + 蔬菜（~100g 碳水 + 25g 蛋白）"
      训练前: "香蕉 1 根 或 能量棒（跑前 30min，~25g 碳水）"
      晚餐: "面条/米饭 + 蛋白质 + 蔬菜（~80g 碳水 + 20g 蛋白）"
      加餐: "水果/酸奶（按需）"
    notes:
      - "不需要碳水负荷，保持正常饮食"
      - "避免尝试新食物"
      - "少油少辛辣，减少肠胃负担"

  3:   # D-3
    phase: "正常训练期（最后一天）"
    carb_target: "260-312g（5-6g/kg）"
    protein_target: "62g（1.2g/kg）"
    water: "1.5-2L"
    meals:
      早餐: "粥/面包 + 鸡蛋 + 牛奶（~60g 碳水 + 20g 蛋白）"
      午餐: "米饭 + 瘦肉/鱼 + 蔬菜（~100g 碳水 + 25g 蛋白）"
      训练后: "巧克力牛奶 300ml 或 香蕉 + 酸奶（30min 内，碳水:蛋白 3:1）"
      晚餐: "面条/米饭 + 蛋白质 + 蔬菜（~80g 碳水 + 20g 蛋白）"
    notes:
      - "明天开始碳水负荷，今天正常吃"
      - "训练后及时补充碳水+蛋白，帮助恢复"
      - "保持清淡，避免肠胃不适"

  2:   # D-2
    phase: "碳水负荷 Day 1"
    carb_target: "416-520g（8-10g/kg）"
    protein_target: "52g（1.0g/kg）"
    water: "2L+"
    meals:
      早餐: "大碗白粥 + 馒头/面包 + 果酱 + 果汁（~120g 碳水）"
      午餐: "大碗米饭（300g+）+ 少量瘦肉 + 蔬菜（~150g 碳水）"
      下午加餐: "香蕉 2 根 + 运动饮料 500ml（~60g 碳水）"
      晚餐: "大碗面条/米饭 + 面包（~140g 碳水）"
      睡前: "果汁 200ml 或 蜂蜜水（~30g 碳水）"
    notes:
      - "**碳水负荷启动！** 目标 416-520g 碳水/天"
      - "以米饭、面条、面包、果汁、香蕉为主"
      - "蛋白质适当降低，把胃的空间留给碳水"
      - "不要吃高脂肪食物（会占胃容量且不利于糖原合成）"
      - "少量多餐，避免单次吃太撑"
      - "如果感觉体重上升 0.5-1kg 是正常的（糖原 + 水分储存）"

  1:   # D-1
    phase: "碳水负荷 Day 2"
    carb_target: "416-520g（8-10g/kg）"
    protein_target: "52g（1.0g/kg）"
    water: "2L+"
    meals:
      早餐: "大碗白粥/面条 + 面包 + 果汁（~120g 碳水）"
      午餐: "大碗米饭（300g+）+ 少量瘦肉（~150g 碳水）"
      下午加餐: "香蕉 + 能量棒 + 运动饮料（~60g 碳水）"
      晚餐: "面条/米饭 + 面包（~130g 碳水）— **最晚 19:00 吃完**"
      睡前: "少量果汁（~30g 碳水）"
    notes:
      - "碳水负荷第二天，继续高碳水饮食"
      - "**晚餐最晚 19:00 完成**，给消化系统充分时间"
      - "**22:00 前入睡**，保证 6+ 小时睡眠"
      - "晚餐不要吃太撑，避免影响睡眠"
      - "明早 04:30 起床，今晚早点准备好赛前早餐食材"

  0:   # D-Day
    phase: 比赛日
    carb_target: "120-150g（赛前早餐）"
    protein_target: 低
    water: "300ml（早餐时）"
    meals:
      "04:30 早餐": "白米饭/面包 + 果酱（120-150g 碳水）— 复制 315 赛前餐"
      "05:00": "100-150mg 咖啡因（1 杯浓缩咖啡）"
      "06:50 赛前 10min": "能量胶 1 支（20-25g 碳水）+ 100ml 水"
      "赛中 5km": "100ml 饮料，快速通过"
      "赛中 10km": "150ml 运动饮料 + 能量胶 1 支 — **关键补给点**"
      "赛中 12.5km": "100ml 水"
      "赛中 15km": "150ml 饮料"
      "赛中 17.5km": "100ml 水"
      "赛中 20km": "跳过或小口 50ml"
    notes:
      - "**严格复制 315 赛前餐 — 已验证无肠胃问题**"
      - "起床后立即喝 200ml 温水"
      - "不吃任何赛前没吃过的东西"

# Recovery monitoring checklist
recovery_checklist:
  晨脉: "起床后卧床测量，应回到基线 ± 3bpm"
  左脚踝: "0-10 疼痛量表，应为 0-2（无痛或微酸）"
  血泡: "目视检查，D+9 后应完全愈合"
  DOMS: "下楼梯/蹲起测试，应无明显酸痛"
  睡眠: "目标 7+ 小时，今晚 22:30 前入睡"

